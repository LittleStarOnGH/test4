<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hybrid Control - Digital Twin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0b0f19; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 30px;
        }
        .container {
            width: 90%; max-width: 480px;
            background: #121826; border-radius: 16px;
            padding: 20px; margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #1f293d;
        }
        h2 { color: #8b5cf6; margin: 0 0 5px 0; font-size: 20px; text-align: center; }
        .status { color: #94a3b8; font-size: 13px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        
        /* 3D Canvas Box */
        #canvas-container {
            width: 100%; height: 280px;
            background: #020617; border-radius: 12px;
            margin-bottom: 15px; border: 1px solid #1e293b;
        }

        /* Control UI */
        .section-title { font-size: 12px; color: #94a3b8; text-align: left; margin: 10px 0 5px 0; text-transform: uppercase; }
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-opt { flex: 1; background: #1e293b; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-opt.active { background: #059669; border-color: #34d399; }
        
        /* Colors */
        .color-picker { display: flex; justify-content: space-between; margin-bottom: 15px; background: #1e293b; padding: 8px; border-radius: 8px; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); }

        /* Sliders */
        .slider-group { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: left; }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; color: #cbd5e1; margin-bottom: 5px; }
        .slider { width: 100%; cursor: pointer; accent-color: #6366f1; }

        .btn-connect { background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-connect.connected { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎛️ Premium Hybrid Control</h2>
    <div class="status" id="status-text">🔴 สแตนด์บาย - รอการเชื่อมต่อ Python</div>
    
    <div id="canvas-container"></div>
    
    <button class="btn-connect" id="connect-btn">🔌 เชื่อมต่อสมองกล Digital Twin</button>

    <div class="section-title">เลือกวัตถุ 3D</div>
    <div class="row">
        <button class="btn-opt" onclick="changeShape('ring')">วงแหวน</button>
        <button class="btn-opt" onclick="changeShape('crystal')">คริสตัล</button>
        <button class="btn-opt" onclick="changeShape('cone')">ทรงกรวย</button>
        <button class="btn-opt active" id="default-shape" onclick="changeShape('gear')">เฟือง 3D</button>
    </div>

    <div class="section-title">เปลี่ยนสีวัตถุ</div>
    <div class="color-picker">
        <div class="color-dot" style="background: #fbbf24;" onclick="changeColor(0xfbbf24, this)"></div>
        <div class="color-dot" style="background: #22d3ee;" onclick="changeColor(0x22d3ee, this)"></div>
        <div class="color-dot" style="background: #f43f5e;" onclick="changeColor(0xf43f5e, this)"></div>
        <div class="color-dot active" style="background: #34d399;" onclick="changeColor(0x34d399, this)"></div>
        <div class="color-dot" style="background: #e879f9;" onclick="changeColor(0xe879f9, this)"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="changeColor(0xffffff, this)"></div>
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>ขนาดสเกลภาพ (Scale)</span><span id="scale-val">100%</span></div>
        <input type="range" class="slider" min="50" max="200" value="100" oninput="updateScale(this.value)">
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>ระยะวิ่งเข้าออกศูนย์กลาง (Offset)</span><span id="offset-val">130px</span></div>
        <input type="range" class="slider" min="50" max="300" value="130" oninput="updateOffset(this.value)">
    </div>
</div>

<script>
    let socket;
    const statusText = document.getElementById('status-text');
    const connectBtn = document.getElementById('connect-btn');
    
    // ----------------------------------------------------
    // 1. ระบบวาดภาพ 3D (Three.js)
    // ----------------------------------------------------
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // ใส่แสงสว่าง
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);
    camera.position.z = 6;

    let currentMesh;
    let currentGeoColor = 0x34d399; // สีเขียวตั้งต้น

    // ฟังก์ชันสร้างรูปทรง 3D
    function createMesh(type) {
        if(currentMesh) scene.remove(currentMesh);
        let geo;
        if(type === 'ring') geo = new THREE.TorusGeometry(1.2, 0.4, 16, 48);
        else if(type === 'crystal') geo = new THREE.OctahedronGeometry(1.5, 0);
        else if(type === 'cone') geo = new THREE.ConeGeometry(1.2, 2.2, 32);
        else geo = new THREE.TorusKnotGeometry(0.8, 0.3, 64, 16); // ใช้ TorusKnot แทนเฟืองให้ดูเท่ขึ้น

        const mat = new THREE.MeshStandardMaterial({ color: currentGeoColor, roughness: 0.2, metalness: 0.5 });
        currentMesh = new THREE.Mesh(geo, mat);
        scene.add(currentMesh);
    }
    
    // เริ่มต้นแสดงผลเป็นทรงเฟือง (TorusKnot)
    createMesh('gear');

    // สั่งวาดลูปซ้ำๆ
    function animate() { 
        requestAnimationFrame(animate); 
        renderer.render(scene, camera); 
    }
    animate();

    // ----------------------------------------------------
    // 2. ฟังก์ชันปุ่มกดควบคุม (UI Controls)
    // ----------------------------------------------------
    function changeShape(type) {
        createMesh(type);
        document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function changeColor(hex, element) {
        currentGeoColor = hex;
        if(currentMesh) currentMesh.material.color.setHex(hex);
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        element.classList.add('active');
    }

    function updateScale(val) {
        document.getElementById('scale-val').innerText = val + '%';
        if(currentMesh) currentMesh.scale.set(val/100, val/100, val/100);
    }

    function updateOffset(val) {
        document.getElementById('offset-val').innerText = val + 'px';
        camera.position.z = (130 / val) * 6; // ปรับระยะกล้อง
    }

    // ----------------------------------------------------
    // 3. ระบบเชื่อมต่อ WebSocket (รับค่าจาก Python)
    // ----------------------------------------------------
    connectBtn.addEventListener('click', () => {
        statusText.innerText = "⏳ กำลังเชื่อมต่อไร้สาย...";
        statusText.style.color = "#fbbf24";
        
        // ชี้เป้าไปที่ Python ในเครื่อง (พอร์ต 8080)
        socket = new WebSocket('ws://127.0.0.1:8080');

        socket.onopen = () => {
            statusText.innerText = "🟢 เชื่อมต่อสมองกลสำเร็จ! วัตถุขยับตามมือได้เลย";
            statusText.style.color = "#4ade80";
            connectBtn.classList.add('connected');
            connectBtn.innerText = "⚡ ระบบตรวจจับตำแหน่งทำงานอยู่";
        };

        socket.onmessage = (event) => {
            // แกะข้อมูล JSON ที่ Python ส่งมา
            const data = JSON.parse(event.data);
            if (data.type === "twin_rotate" && currentMesh) {
                // ขยับหมุนวัตถุตามพิกัด 3D ที่คำนวณจากกล้อง
                currentMesh.rotation.x = data.value.x * (Math.PI / 180);
                currentMesh.rotation.y = data.value.y * (Math.PI / 180);
            }
        };

        socket.onclose = () => {
            statusText.innerText = "🔴 การเชื่อมต่อตัดขาด (โปรดรัน Python ค้างไว้)";
            statusText.style.color = "#f87171";
            connectBtn.classList.remove('connected');
            connectBtn.innerText = "🔌 เชื่อมต่อสมองกล (Digital Twin)";
        };
        
        socket.onerror = (error) => {
            console.error("WebSocket Error: ", error);
            statusText.innerText = "⚠️ เชื่อมต่อไม่ได้ (อาจติด Block ใน Chrome หรือยังไม่รัน Python)";
            statusText.style.color = "#f87171";
        };
    });
</script>
</body>
</html>
